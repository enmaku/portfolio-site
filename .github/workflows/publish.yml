# Build the Quasar SPA and publish to GitHub Pages.
#
# One-time repo setup:
# 1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
# 2. Push to `main` (or change `branches` below).
#
# If `package.json` is not at the repository root, set `defaults.run.working-directory`
# and `upload-pages-artifact.path` to your app folder (e.g. `portfolio-site`).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Photos in src/assets/photos/ use Git LFS (.gitattributes). Without this, the build
      # only gets LFS pointer files and images 404 or fail to decode in the browser.
      #
      # npm run build runs prebuild → generate-thumbs (Sharp) to create src/assets/photos/thumbs/
      # before Vite bundles; thumbs are gitignored and produced on each CI run.
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # TMDB for Movie Vote (Settings → Secrets and variables → Actions). Use either or both.
      # Vite inlines VITE_* at build time (treat as public read-only credentials).
      - name: Install and build
        env:
          # Custom domain serves the site at `/`; `/<repo>/` is only for the github.io project URL.
          GH_PAGES_BASE: /
          SITE_ORIGIN: https://focusdisorder.com
          VITE_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          VITE_TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/spa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment

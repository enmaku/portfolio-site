# Build the Quasar SPA and publish to GitHub Pages.
#
# One-time repo setup:
# 1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
# 2. Push to `main` (or change `branches` below).
#
# If `package.json` is not at the repository root, set `defaults.run.working-directory`
# and `upload-pages-artifact.path` to your app folder (e.g. `portfolio-site`).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Photos in src/assets/photos/ use Git LFS (.gitattributes). Without this, the build
      # only gets LFS pointer files and images 404 or fail to decode in the browser.
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        env:
          # Project page URL is https://<user>.github.io/<repo>/
          GH_PAGES_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/spa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
